version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: esg_navigator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - esg_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - esg_network

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - postgres
    networks:
      - esg_network

  auth:
    build: ../backend/auth
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - postgres
    networks:
      - esg_network

  emission:
    build: ../backend/emission
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - postgres
    networks:
      - esg_network

  analytics:
    build: ../backend/analytics
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - postgres
    networks:
      - esg_network

  org:
    build: ../backend/org
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - postgres
    networks:
      - esg_network

  ingestion:
    build: ../backend/ingestion
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - postgres
    networks:
      - esg_network

  reporting:
    build: ../backend/reporting
    ports:
      - "8006:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - postgres
    networks:
      - esg_network

  billing:
    build: ../backend/billing
    ports:
      - "8007:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - postgres
    networks:
      - esg_network

  ingestion_worker:
    build: ../backend/workers
    command: python ingestion_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - redis
      - postgres
    networks:
      - esg_network

  emissions_worker:
    build: ../backend/workers
    command: python emissions_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - redis
      - postgres
    networks:
      - esg_network

  analytics_worker:
    build: ../backend/workers
    command: python analytics_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - redis
      - postgres
    networks:
      - esg_network

  reporting_worker:
    build: ../backend/workers
    command: python reporting_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esg_navigator
    depends_on:
      - redis
      - postgres
    networks:
      - esg_network

  api_gateway:
    build: ./api_gateway
    ports:
      - "8080:80"
    depends_on:
      - auth
      - emission
      - analytics
      - org
      - ingestion
      - reporting
      - billing
    networks:
      - esg_network

networks:
  esg_network:
    driver: bridge

volumes:
  postgres_data:
